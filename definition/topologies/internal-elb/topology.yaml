# InternalElb topology definition.
# Creates an internal ELB for VPC-internal access only (no public IP).
#
# config.components: Which components are used and their defaults.
# config.configSchema: Reference a Go type for custom topology config fields.
# ui: Rendering hints for the frontend form.

config:
  configSchema: InternalElbTopologyConfig
  components:
    elbEngine:
      defaults:
        replicas: 1
    elbListener:
      optional: true

ui:
  sections:
    basicInfo:
      label: Basic Information
      description: Configure the internal ELB.
      components:
        version:
          uiType: select
          path: spec.components.elbEngine.version
          fieldParams:
            label: ELB Version
    network:
      label: Network
      description: Network configuration for the ELB.
      components:
        vpcId:
          path: spec.components.elbEngine.customSpec.vpcId
          uiType: text
          fieldParams:
            label: VPC ID
            required: true
        vipSubnetCidrId:
          path: spec.components.elbEngine.customSpec.vipSubnetCidrId
          uiType: text
          fieldParams:
            label: Subnet ID
            required: true
        availabilityZoneList:
          path: spec.components.elbEngine.customSpec.availabilityZoneList
          uiType: text
          fieldParams:
            label: Availability Zones
            required: true
    listener:
      label: Listener
      description: Listener configuration for the ELB.
      components:
        protocol:
          path: spec.components.elbListener.customSpec.protocol
          uiType: select
          fieldParams:
            label: Protocol
        port:
          path: spec.components.elbListener.customSpec.port
          uiType: number
          fieldParams:
            label: Port
          validation:
            min: 1
            max: 65535
        backendPort:
          path: spec.components.elbListener.customSpec.backendPort
          uiType: number
          fieldParams:
            label: Backend Port
          validation:
            min: 1
            max: 65535
  sectionsOrder:
    - basicInfo
    - network
    - listener
